<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hub SDR EQI</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d0d0d'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%23D4AF37' font-family='Arial' font-weight='bold'%3EH%3C/text%3E%3C/svg%3E" />
<style>
/* ==========================================================================
   HUB SDR EQI — DESIGN SYSTEM
   ========================================================================== */
:root{
  --color-bg:#0b0b0c;
  --color-bg-alt:#151517;
  --color-surface:#1c1c1f;
  --color-surface-hover:#232327;
  --color-border:#2c2c30;
  --color-gold:#D4AF37;
  --color-gold-light:#E9CB6B;
  --color-gold-dark:#A67F1E;
  --color-text:#F2F1EC;
  --color-text-muted:#A3A198;
  --color-success:#4CAF6D;
  --color-danger:#E0574F;
  --color-info:#4A90D9;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow-card:0 4px 16px rgba(0,0,0,.45);
  --transition:.18s ease;
  --sidebar-w:264px;
  --topbar-h:60px;
}

*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--color-bg);
  color:var(--color-text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{margin:0 0 8px 0;font-weight:700;letter-spacing:.2px;}
p{margin:0 0 10px 0;color:var(--color-text-muted);line-height:1.5;}
button{font-family:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--color-bg);}
::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--color-gold-dark);}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;border-radius:var(--radius-md);border:1px solid transparent;
  font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);
  white-space:nowrap;
}
.btn-primary{background:linear-gradient(135deg,var(--color-gold-light),var(--color-gold));color:#161608;}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-secondary{background:var(--color-surface);color:var(--color-text);border-color:var(--color-border);}
.btn-secondary:hover{background:var(--color-surface-hover);border-color:var(--color-gold-dark);}
.btn-ghost{background:transparent;color:var(--color-text-muted);border-color:transparent;}
.btn-ghost:hover{color:var(--color-text);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-block{width:100%;justify-content:center;}
.btn-sm{padding:7px 12px;font-size:12.5px;}

.tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.tag-baixo{background:rgba(76,175,109,.15);color:var(--color-success);}
.tag-medio{background:rgba(74,144,217,.15);color:var(--color-info);}
.tag-alto{background:rgba(224,87,79,.15);color:var(--color-danger);}
.tag-categoria{background:rgba(212,175,55,.14);color:var(--color-gold-light);}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

.topbar{
  display:none;
  position:sticky;top:0;z-index:30;
  height:var(--topbar-h);
  background:var(--color-bg-alt);
  border-bottom:1px solid var(--color-border);
  align-items:center;gap:12px;padding:0 16px;
}
.topbar .hamburger{
  background:none;border:1px solid var(--color-border);color:var(--color-gold);
  width:38px;height:38px;border-radius:var(--radius-sm);font-size:18px;cursor:pointer;
}
.topbar .topbar-title{font-weight:700;font-size:15px;flex:1;}

.sidebar{
  background:var(--color-bg-alt);
  border-right:1px solid var(--color-border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  z-index:20;
}
.sidebar-header{
  padding:22px 20px 18px 20px;
  border-bottom:1px solid var(--color-border);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--color-gold-light),var(--color-gold-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#161608;font-size:17px;flex-shrink:0;
}
.brand-text .brand-title{font-size:15px;font-weight:800;letter-spacing:.3px;}
.brand-text .brand-sub{font-size:11px;color:var(--color-text-muted);letter-spacing:.4px;text-transform:uppercase;}

.nav{flex:1;padding:16px 12px;overflow-y:auto;}
.nav-group-label{
  font-size:11px;font-weight:700;color:var(--color-text-muted);
  text-transform:uppercase;letter-spacing:.6px;
  margin:18px 10px 8px 10px;
}
.nav-group-label:first-child{margin-top:0;}
.nav-item{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:11px 12px;margin-bottom:3px;border-radius:var(--radius-md);
  background:none;border:1px solid transparent;color:var(--color-text-muted);
  font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:var(--transition);
}
.nav-item:hover{background:var(--color-surface-hover);color:var(--color-text);}
.nav-item.active{background:var(--color-surface);color:var(--color-gold-light);border-color:var(--color-border);}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-item .nav-label{flex:1;}
.badge-soon{
  font-size:9.5px;font-weight:700;color:var(--color-text-muted);
  background:rgba(255,255,255,.06);padding:2px 6px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px;
}

.sidebar-footer{padding:16px;border-top:1px solid var(--color-border);}

.xp-widget{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:12px;}
.xp-widget-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.xp-widget-level{font-size:13px;font-weight:700;color:var(--color-gold-light);}
.xp-widget-xp{font-size:11px;color:var(--color-text-muted);}
.progress-bar{height:7px;background:var(--color-bg);border-radius:999px;overflow:hidden;border:1px solid var(--color-border);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--color-gold-dark),var(--color-gold-light));border-radius:999px;transition:width .4s ease;}

.content{min-width:0;}
.view-container{max-width:1100px;margin:0 auto;padding:32px 32px 60px 32px;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:15;}

/* ---------- dashboard ---------- */
.hero{
  background:linear-gradient(135deg,#17170f,#0d0d0e 60%);
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  padding:28px 30px;margin-bottom:26px;position:relative;overflow:hidden;
}
.hero::after{
  content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,.16),transparent 70%);
}
.hero h1{font-size:23px;}
.hero p{max-width:520px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px;}
.stat-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px 18px;}
.stat-card .stat-value{font-size:24px;font-weight:800;color:var(--color-gold-light);}
.stat-card .stat-label{font-size:12px;color:var(--color-text-muted);margin-top:2px;}

.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-muted);margin:28px 0 12px 0;font-weight:700;}

.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.module-card{
  background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);
  padding:18px;cursor:pointer;transition:var(--transition);
}
.module-card:hover{border-color:var(--color-gold-dark);transform:translateY(-2px);}
.module-card.is-soon{opacity:.6;cursor:default;}
.module-card.is-soon:hover{transform:none;border-color:var(--color-border);}
.module-card .module-icon{font-size:26px;margin-bottom:8px;}
.module-card h3{font-size:15px;margin-bottom:4px;}
.module-card p{font-size:12.5px;margin-bottom:0;}

.reset-row{margin-top:34px;padding-top:16px;border-top:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.reset-row p{font-size:12px;margin:0;max-width:360px;}
.reset-row-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* ---------- em breve ---------- */
.em-breve{text-align:center;padding:70px 20px;}
.em-breve .em-breve-icon{font-size:44px;margin-bottom:14px;}
.em-breve h2{font-size:20px;}
.em-breve p{max-width:420px;margin:0 auto 20px auto;}

/* ---------- módulo produtos ---------- */
.module-header{margin-bottom:18px;}
.module-header h1{font-size:22px;}
.disclaimer{
  font-size:12px;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.25);
  color:var(--color-gold-light);padding:9px 13px;border-radius:var(--radius-sm);margin-bottom:18px;
}

.subtabs{display:flex;gap:6px;border-bottom:1px solid var(--color-border);margin-bottom:22px;flex-wrap:wrap;}
.subtab-btn{
  background:none;border:none;color:var(--color-text-muted);padding:10px 6px;margin-right:14px;
  font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition);
}
.subtab-btn:hover{color:var(--color-text);}
.subtab-btn.active{color:var(--color-gold-light);border-bottom-color:var(--color-gold);}

.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.search-input{
  flex:1;min-width:180px;background:var(--color-surface);border:1px solid var(--color-border);
  color:var(--color-text);padding:10px 14px;border-radius:var(--radius-md);font-size:14px;
}
.search-input:focus{outline:none;border-color:var(--color-gold-dark);}
.filter-chip{
  background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text-muted);
  padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:var(--transition);
}
.filter-chip:hover{color:var(--color-text);}
.filter-chip.active{background:var(--color-gold);color:#161608;border-color:var(--color-gold);}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.product-card{
  background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);
  padding:16px 18px;cursor:pointer;transition:var(--transition);
}
.product-card:hover{border-color:var(--color-gold-dark);}
.product-card .pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.product-card h3{font-size:15.5px;margin:0;}
.product-card .pc-nome-completo{font-size:11.5px;color:var(--color-text-muted);margin-bottom:8px;}
.product-card p.resumo{font-size:13px;margin-bottom:0;}
.product-card .pc-details{
  display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--color-border);
  font-size:12.5px;
}
.product-card.expanded .pc-details{display:block;}
.pc-details .pc-row{margin-bottom:10px;}
.pc-details .pc-row-label{font-weight:700;color:var(--color-gold-light);font-size:11px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.pc-details .pc-row-value{color:var(--color-text);line-height:1.5;}
.pc-toggle-hint{font-size:11px;color:var(--color-text-muted);margin-top:10px;}

/* ---------- flashcards ---------- */
.flashcard-panel{max-width:560px;margin:0 auto;text-align:center;}
.flashcard-progress{font-size:12.5px;color:var(--color-text-muted);margin-bottom:16px;}
.flashcard-scene{perspective:1400px;margin-bottom:20px;}
.flashcard{width:100%;height:260px;position:relative;}
.flashcard-inner{
  width:100%;height:100%;position:relative;transition:transform .5s;
  transform-style:preserve-3d;cursor:pointer;
}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;text-align:center;border:1px solid var(--color-border);
}
.flashcard-front{background:linear-gradient(160deg,var(--color-surface),var(--color-bg-alt));}
.flashcard-back{background:linear-gradient(160deg,#2a2410,var(--color-bg-alt));transform:rotateY(180deg);border-color:var(--color-gold-dark);}
.flashcard-face .fc-tag{margin-bottom:14px;}
.flashcard-face .fc-text{font-size:16.5px;font-weight:600;line-height:1.5;}
.flashcard-hint{font-size:11.5px;color:var(--color-text-muted);margin-bottom:20px;}
.flashcard-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ---------- quiz ---------- */
.quiz-box{max-width:600px;margin:0 auto;}
.quiz-progress{font-size:12.5px;color:var(--color-text-muted);margin-bottom:12px;}
.quiz-question{font-size:17px;font-weight:700;margin-bottom:18px;}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.quiz-option{
  text-align:left;background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text);
  padding:13px 16px;border-radius:var(--radius-md);font-size:14px;cursor:pointer;transition:var(--transition);
}
.quiz-option:hover:not(:disabled){border-color:var(--color-gold-dark);}
.quiz-option:disabled{cursor:default;}
.quiz-option.correct{background:rgba(76,175,109,.14);border-color:var(--color-success);color:var(--color-success);}
.quiz-option.wrong{background:rgba(224,87,79,.14);border-color:var(--color-danger);color:var(--color-danger);}
.quiz-explain{
  background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);
  padding:14px 16px;font-size:13px;margin-bottom:18px;color:var(--color-text-muted);
}
.quiz-explain strong{color:var(--color-text);}
.quiz-result{text-align:center;padding:30px 10px;}
.quiz-result .qr-score{font-size:40px;font-weight:800;color:var(--color-gold-light);margin-bottom:6px;}

/* ---------- comparador ---------- */
.comparador-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.comparador-selects{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.comparador-selects select{
  width:100%;background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text);
  padding:10px 12px;border-radius:var(--radius-md);font-size:13.5px;
}
.comparador-table-wrap{overflow-x:auto;border:1px solid var(--color-border);border-radius:var(--radius-lg);}
table.comparador-table{width:100%;border-collapse:collapse;min-width:520px;}
.comparador-table th,.comparador-table td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--color-border);vertical-align:top;}
.comparador-table th{background:var(--color-bg-alt);color:var(--color-gold-light);font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;}
.comparador-table td.row-label{color:var(--color-text-muted);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.comparador-table tr:last-child td{border-bottom:none;}
.empty-state{text-align:center;padding:50px 20px;color:var(--color-text-muted);font-size:13.5px;}

/* ---------- simulador de propostas ---------- */
.perfil-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
.perfil-card{
  background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);
  padding:22px 18px;text-align:center;cursor:pointer;transition:var(--transition);
}
.perfil-card:hover{border-color:var(--color-gold-dark);transform:translateY(-2px);}
.perfil-card .perfil-icon{font-size:30px;margin-bottom:10px;}
.perfil-card h3{font-size:15.5px;}
.perfil-card p{font-size:12.5px;margin-bottom:0;}

.prospect-msg{
  background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);
  padding:18px 20px;margin-bottom:16px;display:flex;gap:14px;align-items:flex-start;
}
.prospect-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--color-gold-light),var(--color-gold-dark));
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#161608;
}
.prospect-msg-body .prospect-label{font-size:11px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.prospect-msg-body .prospect-text{font-size:15px;font-weight:600;line-height:1.5;}

.resposta-textarea{
  width:100%;min-height:110px;background:var(--color-surface);border:1px solid var(--color-border);
  color:var(--color-text);padding:12px 14px;border-radius:var(--radius-md);font-size:14px;font-family:inherit;
  resize:vertical;margin-bottom:14px;
}
.resposta-textarea:focus{outline:none;border-color:var(--color-gold-dark);}
.resposta-textarea:disabled{opacity:.7;}

.feedback-panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px 18px;margin-bottom:16px;}
.feedback-scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px;}
.feedback-score-item .fs-label{font-size:11px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px;}
.feedback-tips{font-size:13px;color:var(--color-text-muted);margin:0;padding-left:18px;}
.feedback-tips li{margin-bottom:6px;line-height:1.5;}

/* ---------- scripts de ligação ---------- */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px;}
.form-field label{display:block;font-size:11px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;font-weight:700;}
.form-field select, .form-field input[type="text"], .form-field input[type="number"], .form-field input[type="date"]{
  width:100%;background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text);
  padding:10px 12px;border-radius:var(--radius-md);font-size:13.5px;font-family:inherit;
  color-scheme:dark;
}
.form-field select:focus, .form-field input[type="text"]:focus, .form-field input[type="number"]:focus, .form-field input[type="date"]:focus{outline:none;border-color:var(--color-gold-dark);}

.mensagem-output{
  background:var(--color-surface);border:1px solid var(--color-gold-dark);border-radius:var(--radius-lg);
  padding:18px 20px;margin-bottom:16px;font-size:14.5px;line-height:1.6;white-space:pre-wrap;
}

.spin-etapas{display:flex;flex-direction:column;gap:12px;}
.spin-etapa{
  background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);
  padding:16px 18px;display:flex;gap:14px;
}
.spin-etapa-num{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--color-gold-light),var(--color-gold-dark));
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#161608;font-size:15px;
}
.spin-etapa-body h3{font-size:14.5px;margin-bottom:8px;}
.spin-etapa-body ul{margin:0;padding-left:18px;}
.spin-etapa-body li{margin-bottom:5px;line-height:1.5;font-size:13px;color:var(--color-text-muted);}
.pc-details .btn{margin-top:4px;}

/* ---------- metas & performance ---------- */
.funil-etapas{display:flex;flex-direction:column;gap:6px;margin-bottom:26px;}
.funil-etapa{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:12px 16px;}
.funil-etapa-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.funil-etapa-label{font-size:12.5px;color:var(--color-text-muted);font-weight:600;}
.funil-etapa-valor{font-size:17px;font-weight:800;color:var(--color-text);}
.funil-barra-track{height:22px;background:var(--color-bg);border-radius:4px;overflow:hidden;border:1px solid var(--color-border);}
.funil-barra-fill{height:100%;border-radius:0 4px 4px 0;transition:width .4s ease;}
.funil-conversao{font-size:11px;color:var(--color-text-muted);text-align:center;padding:2px 0;}
.funil-conversao strong{color:var(--color-gold-light);font-weight:700;}

.chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:18px 20px;position:relative;}
.chart-card h3{font-size:14px;margin-bottom:16px;color:var(--color-text-muted);font-weight:700;}
.bar-chart-scroll{overflow-x:auto;overflow-y:visible;padding-top:40px;}
.bar-chart{display:flex;align-items:flex-end;gap:2px;height:170px;position:relative;padding-bottom:26px;min-width:100%;}
.bar-col{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  width:22px;flex-shrink:0;height:100%;position:relative;
  background:none;border:none;padding:0;font:inherit;cursor:pointer;
}
.bar-mark{width:100%;max-width:22px;min-height:2px;background:var(--color-gold);border-radius:4px 4px 0 0;transition:filter .15s;}
.bar-col:hover .bar-mark, .bar-col:focus .bar-mark{filter:brightness(1.3);}
.bar-col:focus{outline:none;}
.bar-col:focus-visible .bar-mark{outline:2px solid var(--color-gold-light);outline-offset:2px;}
.bar-axis-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--color-text-muted);white-space:nowrap;}
.chart-tooltip{
  position:absolute;transform:translate(-50%,calc(-100% - 8px));
  background:var(--color-bg-alt);border:1px solid var(--color-gold-dark);color:var(--color-text);
  font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);pointer-events:none;white-space:nowrap;
  z-index:5;box-shadow:var(--shadow-card);
}
.chart-tooltip .ct-valor{color:var(--color-gold-light);font-weight:800;}

.meta-meter{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:20px 22px;}
.meta-meter-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:12px;flex-wrap:wrap;}
.meta-meter-label{font-size:13.5px;font-weight:700;}
.meta-meter-pct{font-size:14px;color:var(--color-gold-light);font-weight:800;}

/* ---------- toasts ---------- */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--color-surface);border:1px solid var(--color-gold-dark);color:var(--color-text);
  padding:12px 18px;border-radius:var(--radius-md);font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow-card);animation:toast-in .25s ease, toast-out .3s ease 2.4s forwards;
  display:flex;align-items:center;gap:8px;
}
@keyframes toast-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes toast-out{to{opacity:0;transform:translateY(-6px);}}

/* ---------- responsive ---------- */
@media (max-width:900px){
  .app{grid-template-columns:1fr;}
  .topbar{display:flex;}
  .sidebar{
    position:fixed;left:0;top:0;height:100vh;width:var(--sidebar-w);
    transform:translateX(-100%);transition:transform .25s ease;
  }
  .sidebar.open{transform:translateX(0);}
  .overlay.open{display:block;}
  .view-container{padding:22px 16px 50px 16px;}
  .comparador-selects{grid-template-columns:1fr;}
  .hero{padding:22px 18px;}
}

<script>
/* ==========================================================================
   HUB SDR EQI — APLICAÇÃO
   Arquivo único, sem dependências externas. Organizado por seções para
   facilitar a adição de novos módulos no futuro.

   COMO ADICIONAR UM NOVO MÓDULO:
   1) Adicione uma entrada no array MODULES (ver seção "CONFIGURAÇÃO DE
      MÓDULOS"), com status:'active' e um "desc" curto.
   2) Escreva uma função renderMeuModulo(container) que monte o HTML do
      módulo dentro do elemento recebido.
   3) Registre essa função no objeto VIEW_RENDERERS, usando o mesmo id do
      módulo como chave.
   4) Pronto — o menu, o roteamento e o card de "em breve" no dashboard já
      são gerados automaticamente a partir do array MODULES.
   ========================================================================== */

/* ============================
   CONFIGURAÇÃO DE MÓDULOS
   ============================ */
const MODULES = [
  { id:'dashboard', label:'Início', icon:'🏠', status:'active', group:null },
  { id:'produtos', label:'Estudo de Produtos', icon:'📚', status:'active', group:'Módulos',
    desc:'Banco de produtos EQI, flashcards, quiz e comparador.' },
  { id:'scripts', label:'Scripts de Ligação', icon:'📞', status:'active', group:'Módulos',
    desc:'Gere mensagens de primeiro contato, siga o roteiro SPIN e use templates prontos por canal.' },
  { id:'objecoes', label:'Quebra de Objeções', icon:'🛡️', status:'active', group:'Módulos',
    desc:'Banco de objeções com explicação e variação por perfil, modo treino e suas próprias anotações.' },
  { id:'simulador', label:'Simulador de Propostas', icon:'🧮', status:'active', group:'Módulos',
    desc:'Simule conversas com prospects por perfil e consulte respostas para objeções comuns.' },
  { id:'metas', label:'Metas & Performance', icon:'📈', status:'active', group:'Módulos',
    desc:'Registre sua atividade diária, acompanhe o funil de conversão e sua meta pessoal.' },
];

/* ============================
   ESTADO / PERSISTÊNCIA
   ============================ */
const STORAGE_KEY = 'hubSdrEqi.state.v1';
const EXPORT_FORMAT_VERSION = 1;
const XP_PER_LEVEL = 100;
const LEVEL_TITLES = ['Trainee EQI','SDR Júnior','SDR Pleno','SDR Sênior','Especialista de Produtos','Mestre EQI'];

// Estado "de fábrica". Todo progresso — do módulo 1 e de módulos futuros —
// deve morar dentro de APP_STATE, para que salvar/exportar/importar
// continue funcionando sem precisar de ajustes específicos por módulo.
function defaultState(){
  return {
    xp: 0,
    flashcardsRevisados: [],
    produtosVistos: [],
    quizMelhorPontuacao: 0,
    quizTentativas: 0,
    objecoesConsultadas: [],
    simulacoesCompletas: 0,
    simulacaoMelhorMedia: 0,
    mensagensGeradas: 0,
    templatesUsados: [],
    minhasObjecoes: [],
    registrosAtividade: [],
    metaPessoal: null,
  };
}

let APP_STATE = defaultState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      APP_STATE = Object.assign(defaultState(), parsed);
    }
  }catch(e){ /* estado local corrompido: segue com o padrão */ }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(APP_STATE));
}
function resetState(){
  if(!confirm('Isso vai zerar todo o seu progresso (XP, nível e o progresso salvo em todos os módulos). Deseja continuar?')) return;
  APP_STATE = defaultState();
  saveState();
  showToast('Progresso zerado.');
  renderRoute(currentModuleId);
  refreshXPWidgets();
}

/* ---------- exportar / importar progresso ---------- */
// Envelope genérico: guarda o estado inteiro, então qualquer campo que
// módulos futuros adicionarem a APP_STATE já é exportado/importado de graça.
function lerEstadoAtualParaExportacao(){
  // Lê o localStorage direto no momento do clique (em vez de confiar apenas
  // na variável APP_STATE em memória) para garantir que o export sempre
  // reflita o progresso realmente salvo — mesmo que esta aba tenha ficado
  // aberta desde antes de progresso ter sido salvo por outra aba/sessão.
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){ /* localStorage indisponível ou corrompido: cai para o estado em memória */ }
  return APP_STATE;
}

function exportarProgresso(){
  const envelope = {
    app: 'hub-sdr-eqi',
    formatVersion: EXPORT_FORMAT_VERSION,
    exportedAt: new Date().toISOString(),
    state: lerEstadoAtualParaExportacao(),
  };
  const blob = new Blob([JSON.stringify(envelope, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hub-sdr-eqi-progresso.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  // Revogar a URL do blob ainda na mesma tarefa síncrona do clique pode
  // invalidar os dados antes do navegador terminar de ler o arquivo para
  // download (ex: quando aparece um diálogo "Salvar como"), fazendo o
  // arquivo baixado vir vazio ou incompleto. Por isso o atraso aqui.
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  showToast('Progresso exportado.');
}

function importarProgressoClick(){
  document.getElementById('importFileInput').click();
}

function handleImportFile(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    event.target.value = '';
    let novoEstado;
    try{
      const parsed = JSON.parse(reader.result);
      novoEstado = (parsed && typeof parsed.state === 'object' && parsed.state !== null) ? parsed.state : parsed;
      if(typeof novoEstado !== 'object' || novoEstado === null || Array.isArray(novoEstado)){
        throw new Error('formato inesperado');
      }
    }catch(e){
      alert('Não foi possível importar esse arquivo. Verifique se é um progresso exportado pelo Hub SDR EQI (.json).');
      return;
    }
    if(!confirm('Isso vai substituir seu progresso atual. Continuar?')) return;
    APP_STATE = Object.assign(defaultState(), novoEstado);
    saveState();
    showToast('Progresso importado com sucesso.');
    renderRoute(currentModuleId);
    refreshXPWidgets();
  };
  reader.onerror = () => alert('Erro ao ler o arquivo selecionado.');
  reader.readAsText(file);
}

/* ============================
   GAMIFICAÇÃO
   ============================ */
function getLevel(xp){ return Math.floor(xp / XP_PER_LEVEL) + 1; }
function getLevelTitle(level){ return LEVEL_TITLES[Math.min(level - 1, LEVEL_TITLES.length - 1)]; }
function getLevelProgress(xp){
  const into = xp % XP_PER_LEVEL;
  return { into, pct: Math.round((into / XP_PER_LEVEL) * 100) };
}

function addXP(amount, reason){
  const beforeLevel = getLevel(APP_STATE.xp);
  APP_STATE.xp += amount;
  saveState();
  showToast(`+${amount} XP — ${reason}`);
  const afterLevel = getLevel(APP_STATE.xp);
  if(afterLevel > beforeLevel){
    setTimeout(() => showToast(`🎉 Você subiu para o nível ${afterLevel}: ${getLevelTitle(afterLevel)}!`), 350);
  }
  refreshXPWidgets();
}

function renderXPWidget(){
  const level = getLevel(APP_STATE.xp);
  const title = getLevelTitle(level);
  const { into, pct } = getLevelProgress(APP_STATE.xp);
  return `
    <div class="xp-widget">
      <div class="xp-widget-top">
        <span class="xp-widget-level">Nível ${level} · ${title}</span>
        <span class="xp-widget-xp">${into}/${XP_PER_LEVEL} XP</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}
function refreshXPWidgets(){
  const footer = document.getElementById('sidebarFooter');
  if(footer) footer.innerHTML = renderXPWidget();
  const dashXP = document.getElementById('dashXPWidget');
  if(dashXP) dashXP.innerHTML = renderXPWidget();
  const dashStats = document.getElementById('dashStatGrid');
  if(dashStats) dashStats.innerHTML = renderStatGridInner();
}

/* ============================
   TOASTS
   ============================ */
function showToast(message){
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2700);
}

/* ============================
   NAVEGAÇÃO / ROTEAMENTO
   ============================ */
let currentModuleId = 'dashboard';
const VIEW_RENDERERS = {
  dashboard: renderDashboard,
  produtos: renderProdutosModule,
  simulador: renderSimuladorModule,
  scripts: renderScriptsModule,
  objecoes: renderObjecoesModule,
  metas: renderMetasModule,
};

function renderSidebarNav(){
  const nav = document.getElementById('nav');
  let html = '';
  let lastGroup = undefined;
  MODULES.forEach(mod => {
    if(mod.group !== lastGroup){
      if(mod.group) html += `<div class="nav-group-label">${mod.group}</div>`;
      lastGroup = mod.group;
    }
    const soonBadge = mod.status === 'soon' ? '<span class="badge-soon">em breve</span>' : '';
    html += `
      <button class="nav-item" data-nav="${mod.id}">
        <span class="nav-icon">${mod.icon}</span>
        <span class="nav-label">${mod.label}</span>
        ${soonBadge}
      </button>
    `;
  });
  nav.innerHTML = html;
  nav.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.nav));
  });
}

function navigateTo(id){
  window.location.hash = id;
}

function renderRoute(id){
  const mod = MODULES.find(m => m.id === id) || MODULES[0];
  currentModuleId = mod.id;
  const container = document.getElementById('viewContainer');
  container.innerHTML = '';
  if(VIEW_RENDERERS[mod.id]){
    VIEW_RENDERERS[mod.id](container);
  } else {
    renderEmBreve(container, mod);
  }
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.nav === mod.id);
  });
  document.getElementById('topbarTitle').textContent = mod.label;
  closeMobileSidebar();
  window.scrollTo(0,0);
}

window.addEventListener('hashchange', () => {
  const id = window.location.hash.replace('#','');
  renderRoute(id || 'dashboard');
});

function closeMobileSidebar(){

}

  `;
}

function renderDashboard(container){
  const activeModules = MODULES.filter(m => m.id !== 'dashboard');
  container.innerHTML = `
    <div class="hero">
      <h1>Bem-vindo ao seu Hub, SDR 👋</h1>
      <p>Seu espaço pessoal de estudo e produtividade na EQI Investimentos. Comece pelo módulo de Estudo de Produtos — os próximos módulos vão sendo liberados aqui mesmo.</p>
    </div>

    <div class="section-title">Seu progresso</div>
    <div id="dashXPWidget" style="margin-bottom:16px;">${renderXPWidget()}</div>
    <div class="stat-grid" id="dashStatGrid">${renderStatGridInner()}</div>

    <div class="section-title">Módulos</div>
    <div class="module-grid" id="dashModuleGrid"></div>

    <div class="reset-row">
      <p>Todo o progresso é salvo apenas neste navegador (localStorage), nada é enviado para nenhum servidor. Exporte um arquivo para levar seu progresso a outro dispositivo.</p>
      <div class="reset-row-actions">
        <button class="btn btn-secondary btn-sm" id="exportBtn">⬇️ Exportar progresso</button>
        <button class="btn btn-secondary btn-sm" id="importBtn">⬆️ Importar progresso</button>
        <input type="file" id="importFileInput" accept="application/json,.json" style="display:none" />
        <button class="btn btn-ghost btn-sm" id="resetBtn">Zerar progresso</button>
      </div>
    </div>
  `;

  const grid = document.getElementById('dashModuleGrid');
  grid.innerHTML = activeModules.map(mod => `
    <div class="module-card ${mod.status === 'soon' ? 'is-soon' : ''}" data-mod="${mod.id}">
      <div class="module-icon">${mod.icon}</div>
      <h3>${mod.label}</h3>
      <p>${mod.desc || ''}</p>
    </div>
  `).join('');
  grid.querySelectorAll('[data-mod]').forEach(card => {
    card.addEventListener('click', () => navigateTo(card.dataset.mod));
  });

  document.getElementById('resetBtn').addEventListener('click', resetState);
  document.getElementById('exportBtn').addEventListener('click', exportarProgresso);
  document.getElementById('importBtn').addEventListener('click', importarProgressoClick);
  document.getElementById('importFileInput').addEventListener('change', handleImportFile);
}

/* ============================
   VIEW: EM BREVE (genérica)
   ============================ */

      <button class="btn btn-secondary" id="backToDash">Voltar ao início</button>
    </div>
  `;
  document.getElementById('backToDash').addEventListener('click', () => navigateTo('dashboard'));
}

function renderBiblioteca(container){
  container.innerHTML = `
    <div class="toolbar">
      <input type="text" class="search-input" id="bibBusca" placeholder="Buscar produto (ex: CDB, previdência...)" value="${bibliotecaFiltro.busca}" />

  document.getElementById('bibFiltros').innerHTML = CATEGORIAS.map(cat => `
    <button class="filter-chip ${bibliotecaFiltro.categoria === cat ? 'active' : ''}" data-cat="${cat}">${cat}</button>
  `).join('');
  document.getElementById('bibFiltros').querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      bibliotecaFiltro.categoria = btn.dataset.cat;
      renderBiblioteca(container);
    });
  });
  document.getElementById('bibBusca').addEventListener('input', (e) => {
    bibliotecaFiltro.busca = e.target.value;
    renderBibGrid();
  });
  renderBibGrid();

function renderBibGrid(){
  const grid = document.getElementById('bibGrid');
  const termo = bibliotecaFiltro.busca.trim().toLowerCase();
  const filtrados = PRODUTOS.filter(p => {
    const matchCat = bibliotecaFiltro.categoria === 'Todos' || p.categoria === bibliotecaFiltro.categoria;
    const matchBusca = !termo || p.nome.toLowerCase().includes(termo) || p.nomeCompleto.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo);
    return matchCat && matchBusca;
  });

  if(filtrados.length === 0){
    grid.innerHTML = `<div class="empty-state">Nenhum produto encontrado para essa busca.</div>`;
    return;
  }

  grid.innerHTML = filtrados.map(p => `
    <div class="product-card" data-id="${p.id}">
      <div class="pc-top">
        <h3>${p.nome}</h3>
        <span class="tag tag-categoria">${p.categoria}</span>
      </div>
      <div class="pc-nome-completo">${p.nomeCompleto}</div>
      <p class="resumo">${p.resumo}</p>
      <div class="pc-details">
        <div class="pc-row"><div class="pc-row-label">Prazo</div><div class="pc-row-value">${p.prazo}</div></div>
        <div class="pc-row"><div class="pc-row-label">Liquidez</div><div class="pc-row-value">${p.liquidez}</div></div>
        <div class="pc-row"><div class="pc-row-label">Risco</div><div class="pc-row-value"><span class="tag ${riscoTagClass(p.risco)}">${p.risco}</span><br/>${p.riscoDetalhe}</div></div>
        <div class="pc-row"><div class="pc-row-label">Tributação</div><div class="pc-row-value">${p.tributacao}</div></div>
        <div class="pc-row"><div class="pc-row-label">Garantia</div><div class="pc-row-value">${p.garantia}</div></div>
        <div class="pc-row"><div class="pc-row-label">Indicado para</div><div class="pc-row-value">${p.indicadoPara}</div></div>
      </div>
      <div class="pc-toggle-hint">Clique para ver detalhes</div>
    </div>
  `).join('');

  grid.querySelectorAll('.product-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('expanded');
      const id = card.dataset.id;
      if(!APP_STATE.produtosVistos.includes(id)){
        APP_STATE.produtosVistos.push(id);
        saveState();
        addXP(2, `estudou ${PRODUTOS.find(p => p.id === id).nome}`);
      }
    });
  });
}

/* ---------- FLASHCARDS ---------- */
function embaralhar(arr){
  const copia = [...arr];
  for(let i = copia.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}

function iniciarFlashcards(){
  flashcardState = { deck: embaralhar(FLASHCARDS_TODOS), index: 0, flipped: false };
}

function renderFlashcardsView(container){
  if(flashcardState.deck.length === 0) iniciarFlashcards();
  container.innerHTML = `
    <div class="flashcard-panel">
      <div class="flashcard-progress" id="fcProgress"></div>
      <div class="flashcard-scene">
        <div class="flashcard" id="fcCard">
          <div class="flashcard-inner" id="fcInner">
            <div class="flashcard-face flashcard-front">
              <span class="tag tag-categoria fc-tag" id="fcTagFront"></span>
              <div class="fc-text" id="fcFront"></div>
            </div>
            <div class="flashcard-face flashcard-back">
              <span class="tag tag-baixo fc-tag" id="fcTagBack">Resposta</span>
              <div class="fc-text" id="fcBack"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="flashcard-hint">Clique no card para virar</div>
      <div class="flashcard-controls">
        <button class="btn btn-secondary" id="fcShuffle">🔀 Embaralhar</button>
        <button class="btn btn-primary" id="fcNext">Próximo card →</button>
      </div>
    </div>
  `;
  document.getElementById('fcInner').addEventListener('click', () => {
    flashcardState.flipped = !flashcardState.flipped;
    document.getElementById('fcCard').classList.toggle('flipped', flashcardState.flipped);
    if(flashcardState.flipped) marcarFlashcardRevisado();
  });
  document.getElementById('fcNext').addEventListener('click', () => {
    flashcardState.index = (flashcardState.index + 1) % flashcardState.deck.length;
    flashcardState.flipped = false;
    renderFlashcardContent();
  });
  document.getElementById('fcShuffle').addEventListener('click', () => {
    iniciarFlashcards();
    renderFlashcardContent();
  });
  renderFlashcardContent();
}

function renderFlashcardContent(){
  const card = flashcardState.deck[flashcardState.index];
  document.getElementById('fcProgress').textContent = `Card ${flashcardState.index + 1} de ${flashcardState.deck.length}`;

/* ---------- QUIZ ---------- */
function iniciarQuiz(){
  quizState = { perguntas: embaralhar(QUIZ_PERGUNTAS), index:0, acertos:0, respondida:false, finalizado:false };
}

function renderQuizView(container){
  if(quizState.perguntas.length === 0) iniciarQuiz();
  container.innerHTML = `<div class="quiz-box" id="quizBox"></div>`;
  renderQuizContent();
}

function renderQuizContent(){
  const box = document.getElementById('quizBox');
  if(quizState.finalizado){
    const total = quizState.perguntas.length;
    const pct = Math.round((quizState.acertos / total) * 100);
    box.innerHTML = `
      <div class="quiz-result">
        <div class="qr-score">${quizState.acertos}/${total}</div>
        <p>Você acertou ${pct}% das perguntas.</p>
        <button class="btn btn-primary" id="quizRestart">Refazer quiz</button>
      </div>
    `;
    document.getElementById('quizRestart').addEventListener('click', () => {
      iniciarQuiz();
      renderQuizContent();
    });
    return;
  }

  const q = quizState.perguntas[quizState.index];
  box.innerHTML = `
    <div class="quiz-progress">Pergunta ${quizState.index + 1} de ${quizState.perguntas.length} · Acertos: ${quizState.acertos}</div>
    <div class="quiz-question">${q.pergunta}</div>
    <div class="quiz-options" id="quizOptions"></div>
    <div id="quizExplainWrap"></div>
    <button class="btn btn-primary" id="quizNext" style="display:none;">Próxima pergunta →</button>
  `;
  const optsEl = document.getElementById('quizOptions');
  optsEl.innerHTML = q.opcoes.map((op, i) => `<button class="quiz-option" data-i="${i}">${op}</button>`).join('');
  optsEl.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => responderQuiz(parseInt(btn.dataset.i, 10)));
  });
}

function responderQuiz(indiceEscolhido){
  if(quizState.respondida) return;
  quizState.respondida = true;
  const q = quizState.perguntas[quizState.index];
  const acertou = indiceEscolhido === q.correta;
  if(acertou) quizState.acertos++;

  document.querySelectorAll('#quizOptions .quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.correta) btn.classList.add('correct');
    else if(i === indiceEscolhido) btn.classList.add('wrong');
  });

  document.getElementById('quizExplainWrap').innerHTML = `
    <div class="quiz-explain"><strong>${acertou ? 'Certo!' : 'Quase.'}</strong> ${q.explicacao}</div>
  `;
  document.getElementById('quizNext').style.display = 'inline-flex';
  document.getElementById('quizNext').addEventListener('click', avancarQuiz);

  addXP(acertou ? 10 : 2, acertou ? 'resposta certa no quiz' : 'participação no quiz');
}

function avancarQuiz(){
  quizState.index++;
  quizState.respondida = false;
  if(quizState.index >= quizState.perguntas.length){
    quizState.finalizado = true;
    const total = quizState.perguntas.length;
    APP_STATE.quizTentativas++;
    if(quizState.acertos > APP_STATE.quizMelhorPontuacao){
      APP_STATE.quizMelhorPontuacao = quizState.acertos;
    }
    saveState();
    if(quizState.acertos === total){
      addXP(20, 'quiz completo com nota máxima');
    }
    refreshXPWidgets();
  }
  renderQuizContent();
}

const PALAVRAS_PRIORITARIAS_PERFIL = {
  conservador: ['garantia','fgc','segurança','seguro','sem risco','regulamentado','cvm','banco central'],
  moderado: ['diversificação','equilíbrio','comparação','liquidez','rentabilidade'],

// Análise por regras simples (sem IA): tamanho/estrutura da resposta,
// presença de perguntas abertas (SPIN Selling) e palavras que geram confiança.
function analisarResposta(texto, perfil){
  const t = texto.trim();
  const lower = t.toLowerCase();
  const palavras = t.split(/\s+/).filter(Boolean);

  let clareza = 15;
  if(t.length >= 40) clareza += 25;
  if(t.length >= 100) clareza += 20;
  if(palavras.length >= 8) clareza += 20;
  if(/[.!?]/.test(t)) clareza += 20;
  if(t.length > 600) clareza -= 20;
  clareza = Math.max(0, Math.min(100, clareza));

  const temPergunta = t.includes('?');
  const etapasSpin = {
    situacao: ['hoje','atualmente','no momento','como você','como está','me conta'],
    problema: ['dificuldade','problema','preocupa','preocupação','desafio','receio'],
    implicacao: ['impacto','se continuar','no longo prazo','isso significa','pode significar','consequência'],
    necessidade: ['ajudaria','gostaria','seria útil','faz sentido','o que você busca','qual seu objetivo','importante pra você'],
  };
  let etapasCobertas = 0;
  Object.values(etapasSpin).forEach(lista => {
    if(lista.some(p => lower.includes(p))) etapasCobertas++;
  });
  let spin = etapasCobertas * 18 + (temPergunta ? 28 : 0);
  spin = Math.max(0, Math.min(100, spin));

  const palavrasConfianca = ['garantia','fgc','regulamentado','regulamentação','cvm','banco central','transparente','dados','histórico','segurança','diversificação','rentabilidade','liquidez'];
  const palavrasHedge = ['acho que','talvez','não sei','não tenho certeza','pode ser que','imagino que','sei lá'];
  let confianca = 35;
  confianca += palavrasConfianca.filter(p => lower.includes(p)).length * 9;
  confianca += (PALAVRAS_PRIORITARIAS_PERFIL[perfil] || []).filter(p => lower.includes(p)).length * 6;
  confianca -= palavrasHedge.filter(p => lower.includes(p)).length * 15;
  if(t.length < 20) confianca -= 25;
  confianca = Math.max(0, Math.min(100, confianca));

  const media = Math.round((clareza + spin + confianca) / 3);
  return { clareza, spin, confianca, media, temPergunta, etapasCobertas };
}

function gerarDicasFeedback(analise){
  const dicas = [];
  if(analise.clareza < 50){
    dicas.push('Estruture melhor a resposta: contextualize, explique e feche com uma pergunta ou próximo passo.');
  } else {
    dicas.push('Boa clareza — a resposta tem tamanho e estrutura adequados.');
  }
  if(analise.spin < 40){
    dicas.push('Explore mais a técnica SPIN: faça perguntas abertas sobre a situação, o problema e o impacto antes de "vender" a solução.');
  } else if(!analise.temPergunta){
    dicas.push('Bons elementos, mas tente também devolver uma pergunta ao prospect para manter o diálogo aberto.');
  } else {
    dicas.push('Boa aplicação de SPIN Selling — você conduziu a conversa com perguntas relevantes.');
  }
  if(analise.confianca < 50){
    dicas.push('Reforce a confiança citando dados concretos: garantias (FGC), regulamentação (CVM), histórico ou transparência.');
  } else {
    dicas.push('Resposta transmite segurança — bom uso de argumentos concretos para esse perfil de prospect.');
  }
  return dicas;
}

/* ---------- SIMULAÇÃO ---------- */
function iniciarSimulacao(perfilId){
  simState = {
    perfil: perfilId,
    perguntas: embaralhar(PROSPECT_PERGUNTAS[perfilId]),
    index: 0,
    respostas: [],
    finalizado: false,
  };
  renderSimuladorSubView();
}

function encerrarSimulacao(){
  simState = { perfil:null, perguntas:[], index:0, respostas:[], finalizado:false };
  renderSimuladorSubView();
}

function renderSimulacao(container){
  if(!simState.perfil){
    container.innerHTML = `
      <h2 style="font-size:16px;margin-bottom:14px;">Escolha o perfil do prospect</h2>
      <div class="perfil-grid" id="perfilGrid"></div>
    `;
    const grid = document.getElementById('perfilGrid');
    grid.innerHTML = PROSPECT_PERFIS.map(p => `
      <div class="perfil-card" data-perfil="${p.id}">
        <div class="perfil-icon">${p.icon}</div>
        <h3>${p.label}</h3>
        <p>${p.descricao}</p>
      </div>
    `).join('');
    grid.querySelectorAll('[data-perfil]').forEach(card => {
      card.addEventListener('click', () => iniciarSimulacao(card.dataset.perfil));
    });
    return;
  }

  if(simState.finalizado){
    renderSimulacaoResultado(container);
    return;
  }

  const perfilInfo = PROSPECT_PERFIS.find(p => p.id === simState.perfil);
  const pergunta = simState.perguntas[simState.index];
  container.innerHTML = `
    <div class="quiz-progress">Perfil ${perfilInfo.label} · Pergunta ${simState.index + 1} de ${simState.perguntas.length}</div>
    <div class="prospect-msg">
      <div class="prospect-avatar">${perfilInfo.icon}</div>
      <div class="prospect-msg-body">
        <div class="prospect-label">Prospect ${perfilInfo.label} diz:</div>
        <div class="prospect-text">"${pergunta}"</div>
      </div>
    </div>
    <textarea class="resposta-textarea" id="respostaInput" placeholder="Digite aqui como você responderia a esse prospect..."></textarea>
    <div class="flashcard-controls" style="justify-content:flex-start;margin-bottom:16px;">
      <button class="btn btn-primary" id="enviarRespostaBtn">Enviar resposta</button>
      <button class="btn btn-ghost" id="sairSimulacaoBtn">Encerrar simulação</button>
    </div>
    <div id="feedbackWrap"></div>
  `;
  document.getElementById('enviarRespostaBtn').addEventListener('click', enviarRespostaSimulacao);
  document.getElementById('sairSimulacaoBtn').addEventListener('click', encerrarSimulacao);
}

function feedbackScoreHTML(label, valor){
  const nivel = valor >= 70 ? 'tag-baixo' : valor >= 40 ? 'tag-medio' : 'tag-alto';
  return `
    <div class="feedback-score-item">
      <div class="fs-label">${label}</div>
      <span class="tag ${nivel}">${valor}/100</span>
    </div>
  `;
}

function enviarRespostaSimulacao(){
  const input = document.getElementById('respostaInput');
  const texto = input.value;
  if(texto.trim().length < 5){
    alert('Escreva uma resposta antes de enviar.');
    return;
  }

  const analise = analisarResposta(texto, simState.perfil);
  simState.respostas.push({ pergunta: simState.perguntas[simState.index], texto, analise });

  input.disabled = true;
  document.getElementById('enviarRespostaBtn').style.display = 'none';
  document.getElementById('sairSimulacaoBtn').style.display = 'none';

  const dicas = gerarDicasFeedback(analise);
  const ultimaPergunta = simState.index + 1 >= simState.perguntas.length;
  document.getElementById('feedbackWrap').innerHTML = `
    <div class="feedback-panel">
      <div class="feedback-scores">
        ${feedbackScoreHTML('Clareza', analise.clareza)}
        ${feedbackScoreHTML('Técnica SPIN', analise.spin)}
        ${feedbackScoreHTML('Confiança gerada', analise.confianca)}
      </div>
      <ul class="feedback-tips">${dicas.map(d => `<li>${d}</li>`).join('')}</ul>
    </div>
    <button class="btn btn-primary" id="proximaPerguntaBtn">${ultimaPergunta ? 'Ver resultado final →' : 'Próxima pergunta →'}</button>
  `;
  document.getElementById('proximaPerguntaBtn').addEventListener('click', avancarSimulacao);

  addXP(Math.max(2, Math.round(analise.media / 10)), 'resposta na simulação de propostas');
}

function avancarSimulacao(){
  simState.index++;
  if(simState.index >= simState.perguntas.length){
    simState.finalizado = true;
    const total = simState.respostas.length;
    const mediaGeral = Math.round(simState.respostas.reduce((acc, r) => acc + r.analise.media, 0) / total);
    APP_STATE.simulacoesCompletas++;
    if(mediaGeral > APP_STATE.simulacaoMelhorMedia){
      APP_STATE.simulacaoMelhorMedia = mediaGeral;
    }
    saveState();
    addXP(15, 'simulação completa');
  }
  renderSimuladorSubView();
}

function renderSimulacaoResultado(container){
  const total = simState.respostas.length;
  const mediaGeral = Math.round(simState.respostas.reduce((acc, r) => acc + r.analise.media, 0) / total);
  const nivel = mediaGeral >= 70 ? 'Alta' : mediaGeral >= 40 ? 'Média' : 'Baixa';
  container.innerHTML = `
    <div class="quiz-result">
      <div class="qr-score">${mediaGeral}/100</div>
      <p>Confiança média gerada no prospect: <strong>${nivel}</strong> (${total} pergunta${total > 1 ? 's' : ''} respondida${total > 1 ? 's' : ''}).</p>
      <button class="btn btn-primary" id="novaSimulacaoBtn">Nova simulação</button>
    </div>
  `;
  document.getElementById('novaSimulacaoBtn').addEventListener('click', encerrarSimulacao);
}

function renderObjGrid(){
  const grid = document.getElementById('objGrid');
  const termo = objecoesFiltro.busca.trim().toLowerCase();
  const filtradas = OBJECOES.filter(o => {
    const matchCat = objecoesFiltro.categoria === 'Todas' || o.categoria === objecoesFiltro.categoria;
    const matchBusca = !termo || o.objecao.toLowerCase().includes(termo) || o.categoria.toLowerCase().includes(termo) || o.resposta.toLowerCase().includes(termo);
    return matchCat && matchBusca;
  });

  if(filtradas.length === 0){
    grid.innerHTML = `<div class="empty-state">Nenhuma objeção encontrada para essa busca.</div>`;
    return;
  }

  grid.innerHTML = filtradas.map(o => `
    <div class="product-card" data-id="${o.id}">
      <div class="pc-top">
        <h3>"${o.objecao}"</h3>
        <span class="tag tag-categoria">${o.categoria}</span>
      </div>
      <div class="pc-details">
        <div class="pc-row">
          <div class="pc-row-label">Resposta sugerida</div>
          <div class="pc-row-value">${o.resposta}</div>
        </div>
      </div>
      <div class="pc-toggle-hint">Clique para ver a resposta sugerida</div>
    </div>
  `).join('');

  grid.querySelectorAll('.product-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('expanded');
      const id = card.dataset.id;
      if(!APP_STATE.objecoesConsultadas.includes(id)){
        APP_STATE.objecoesConsultadas.push(id);
        saveState();
        addXP(2, 'consultou uma objeção');
      }
    });
  });
}

function escolherAleatorio(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function inserirNome(template, nome){
  return template.replace('{nome}', nome && nome.trim() ? ` ${nome.trim()}` : '');
}

function gerarMensagem({ canal, perfil, nome, gatilho, faixaEtaria }){
  const faixa = FAIXAS_ETARIAS.find(f => f.id === faixaEtaria) || FAIXAS_ETARIAS[1];
  const tom = faixa.tom;
  const abertura = inserirNome(escolherAleatorio(MSG_ABERTURAS[canal][tom]), nome);
  const gancho = escolherAleatorio(MSG_GANCHOS_PERFIL[perfil]);
  const fechamento = escolherAleatorio(MSG_FECHAMENTOS[canal][tom]);

  let partes = [abertura, gancho];
  if(gatilho && gatilho.trim()){
    partes.push(escolherAleatorio(MSG_GATILHO_CONECTORES).replace('{gatilho}', gatilho.trim()));
  }
  partes.push(fechamento);
  return partes.join(' ');
}

/* ---------- copiar para a área de transferência ---------- */
function copiarTexto(texto){
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); }catch(e){ /* nada mais a fazer */ }
    ta.remove();
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(texto).catch(fallback);
  } else {
    fallback();
  }
  showToast('Copiado para a área de transferência!');
}

/* ==========================================================================
   MÓDULO: METAS & PERFORMANCE — DADOS E UTILITÁRIOS
   ========================================================================== */
const PERIODOS_PERFORMANCE = [
  { id:'7d', label:'Últimos 7 dias' },
  { id:'30d', label:'Últimos 30 dias' },
  { id:'tudo', label:'Tudo' },
];
const METRICAS_ATIVIDADE = [
  { id:'ligacoes', label:'Ligações' },
  { id:'reunioes', label:'Reuniões' },
  { id:'propostas', label:'Propostas' },
  { id:'fechamentos', label:'Fechamentos' },
];
// Rampa ordinal de um único matiz (dourado), validada com scripts/validate_palette.js
// (validateOrdinal, mode "dark", surface #1c1c1f): lightness monotônica, ΔL >= 0.06
// entre etapas, contraste do extremo >= 2:1, hue único — segura pra codificar
// a ordem das etapas do funil (ligações → fechamentos).
const FUNIL_CORES = ['#E9CB6B', '#D4AF37', '#B89330', '#A67F1E'];

function formatarDataISO(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function hojeISO(){ return formatarDataISO(new Date()); }
function formatarDataBR(iso){
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function getRegistrosNoPeriodo(periodo){
  if(periodo === 'tudo') return [...APP_STATE.registrosAtividade].sort((a, b) => a.data.localeCompare(b.data));
  const dias = periodo === '7d' ? 7 : 30;
  const limite = new Date();
  limite.setDate(limite.getDate() - (dias - 1));
  const limiteStr = formatarDataISO(limite);
  return APP_STATE.registrosAtividade.filter(r => r.data >= limiteStr).sort((a, b) => a.data.localeCompare(b.data));
}

function construirSerieDiaria(periodo){
  const hoje = new Date();
  let inicio;
  if(periodo === '7d'){ inicio = new Date(); inicio.setDate(inicio.getDate() - 6); }
  else if(periodo === '30d'){ inicio = new Date(); inicio.setDate(inicio.getDate() - 29); }
  else if(APP_STATE.registrosAtividade.length > 0){
    const datas = APP_STATE.registrosAtividade.map(r => r.data).sort();
    inicio = new Date(datas[0] + 'T00:00:00');
  } else {
    inicio = new Date();
  }
  const mapa = new Map(APP_STATE.registrosAtividade.map(r => [r.data, r]));
  const serie = [];
  const cursor = new Date(inicio);
  const hojeStr = formatarDataISO(hoje);
  while(formatarDataISO(cursor) <= hojeStr){
    const chave = formatarDataISO(cursor);
    const registro = mapa.get(chave);
    serie.push({
      data: chave,
      ligacoes: registro ? registro.ligacoes : 0,
      reunioes: registro ? registro.reunioes : 0,
      propostas: registro ? registro.propostas : 0,
      fechamentos: registro ? registro.fechamentos : 0,
    });
    cursor.setDate(cursor.getDate() + 1);
  }
  return serie;
}

    </div>
    <div class="disclaimer">Todos os registros ficam salvos apenas neste navegador — use exportar/importar para levar seu histórico a outro dispositivo.</div>
    <div class="subtabs" id="metasSubtabs">
      <button class="subtab-btn" data-sub="registrar">Registrar Atividade</button>
      <button class="subtab-btn" data-sub="performance">Performance</button>
      <button class="subtab-btn" data-sub="meta">Minha Meta</button>
    </div>
    <div id="metasSubcontent"></div>
  `;
  document.querySelectorAll('#metasSubtabs [data-sub]').forEach(btn => {
    btn.addEventListener('click', () => {
      metasSubView = btn.dataset.sub;
      renderMetasSubView();
    });
  });
  renderMetasSubView();
}

function renderMetasSubView(){
  document.querySelectorAll('#metasSubtabs [data-sub]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sub === metasSubView);
  });
  const el = document.getElementById('metasSubcontent');
  if(metasSubView === 'registrar') renderRegistrarAtividade(el);
  else if(metasSubView === 'performance') renderPerformance(el);
  else if(metasSubView === 'meta') renderMinhaMeta(el);
}

/* ---------- REGISTRAR ATIVIDADE ---------- */
function renderRegistrarAtividade(container){
  if(!registroForm.data) registroForm.data = hojeISO();
  container.innerHTML = `
    <div class="form-grid">
      <div class="form-field">
        <label for="raData">Data</label>
        <input type="date" id="raData" value="${registroForm.data}" />
      </div>
      <div class="form-field">
        <label for="raLigacoes">Ligações feitas</label>
        <input type="number" min="0" id="raLigacoes" value="${registroForm.ligacoes}" />
      </div>
      <div class="form-field">
        <label for="raReunioes">Reuniões/apresentações</label>
        <input type="number" min="0" id="raReunioes" value="${registroForm.reunioes}" />
      </div>
      <div class="form-field">
        <label for="raPropostas">Propostas enviadas</label>
        <input type="number" min="0" id="raPropostas" value="${registroForm.propostas}" />
      </div>
      <div class="form-field">
        <label for="raFechamentos">Fechamentos</label>
        <input type="number" min="0" id="raFechamentos" value="${registroForm.fechamentos}" />
      </div>
    </div>
    <div class="flashcard-controls" style="justify-content:flex-start;margin-bottom:6px;">
      <button class="btn btn-primary" id="salvarRegistroBtn">💾 Salvar registro do dia</button>
    </div>
    <p id="registroEditandoAviso" style="font-size:12px;min-height:18px;"></p>
    <div class="section-title" style="margin-top:20px;">Seus registros</div>
    <div id="registrosTableWrap"></div>
  `;
  document.getElementById('raData').addEventListener('change', (e) => {
    registroForm.data = e.target.value;
    carregarRegistroExistente();
  });
  document.getElementById('salvarRegistroBtn').addEventListener('click', salvarRegistroAtividade);
  carregarRegistroExistente();
  renderTabelaRegistros();
}

function carregarRegistroExistente(){
  const existente = APP_STATE.registrosAtividade.find(r => r.data === registroForm.data);
  const aviso = document.getElementById('registroEditandoAviso');
  if(existente){
    document.getElementById('raLigacoes').value = existente.ligacoes;
    document.getElementById('raReunioes').value = existente.reunioes;
    document.getElementById('raPropostas').value = existente.propostas;
    document.getElementById('raFechamentos').value = existente.fechamentos;
    if(aviso) aviso.textContent = 'Já existe um registro para essa data — salvar vai atualizar os valores.';
  } else {
    document.getElementById('raLigacoes').value = 0;
    document.getElementById('raReunioes').value = 0;
    document.getElementById('raPropostas').value = 0;
    document.getElementById('raFechamentos').value = 0;
    if(aviso) aviso.textContent = '';
  }
}

function salvarRegistroAtividade(){
  const data = document.getElementById('raData').value;
  if(!data){
    alert('Selecione uma data.');
    return;
  }
  const ligacoes = Math.max(0, parseInt(document.getElementById('raLigacoes').value, 10) || 0);
  const reunioes = Math.max(0, parseInt(document.getElementById('raReunioes').value, 10) || 0);
  const propostas = Math.max(0, parseInt(document.getElementById('raPropostas').value, 10) || 0);
  const fechamentos = Math.max(0, parseInt(document.getElementById('raFechamentos').value, 10) || 0);

  const existenteIndex = APP_STATE.registrosAtividade.findIndex(r => r.data === data);
  const eraNovo = existenteIndex === -1;
  const registro = {
    id: eraNovo ? ('reg-' + data) : APP_STATE.registrosAtividade[existenteIndex].id,
    data, ligacoes, reunioes, propostas, fechamentos,
  };

  if(eraNovo){
    APP_STATE.registrosAtividade.push(registro);
  } else {
    APP_STATE.registrosAtividade[existenteIndex] = registro;
  }
  saveState();

  if(eraNovo){
    addXP(5, 'registrou atividade do dia');
  } else {
    showToast('Registro atualizado.');
  }

  registroForm = { data, ligacoes, reunioes, propostas, fechamentos };
  renderTabelaRegistros();
  document.getElementById('registroEditandoAviso').textContent = 'Já existe um registro para essa data — salvar vai atualizar os valores.';
}

function renderTabelaRegistros(){
  const wrap = document.getElementById('registrosTableWrap');
  if(!wrap) return;
  const registros = [...APP_STATE.registrosAtividade].sort((a, b) => b.data.localeCompare(a.data));
  if(registros.length === 0){
    wrap.innerHTML = `<div class="empty-state">Nenhum registro ainda. Use o formulário acima para começar.</div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="comparador-table-wrap">
      <table class="comparador-table">
        <thead>
          <tr><th>Data</th><th>Ligações</th><th>Reuniões</th><th>Propostas</th><th>Fechamentos</th><th></th></tr>
        </thead>
        <tbody>
          ${registros.map(r => `
            <tr>
              <td>${formatarDataBR(r.data)}</td>
              <td>${r.ligacoes}</td>
              <td>${r.reunioes}</td>
              <td>${r.propostas}</td>
              <td>${r.fechamentos}</td>
              <td>
                <button class="btn btn-ghost btn-sm" data-editar="${r.data}">✏️ Editar</button>
                <button class="btn btn-ghost btn-sm" data-excluir="${r.id}">🗑️</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  wrap.querySelectorAll('[data-editar]').forEach(btn => {
    btn.addEventListener('click', () => {
      registroForm.data = btn.dataset.editar;
      document.getElementById('raData').value = registroForm.data;
      carregarRegistroExistente();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
  wrap.querySelectorAll('[data-excluir]').forEach(btn => {
    btn.addEventListener('click', () => {
      if(!confirm('Excluir esse registro?')) return;
      APP_STATE.registrosAtividade = APP_STATE.registrosAtividade.filter(r => r.id !== btn.dataset.excluir);
      saveState();
      renderTabelaRegistros();
    });
  });
}

/* ---------- PERFORMANCE (funil + gráfico + KPIs) ---------- */
function renderPerformance(container){
  container.innerHTML = `
    <div class="toolbar" id="periodoFiltros"></div>
    <div id="performanceConteudo"></div>
  `;
  document.getElementById('periodoFiltros').innerHTML = PERIODOS_PERFORMANCE.map(p => `
    <button class="filter-chip ${performancePeriodo === p.id ? 'active' : ''}" data-periodo="${p.id}">${p.label}</button>
  `).join('');
  document.getElementById('periodoFiltros').querySelectorAll('[data-periodo]').forEach(btn => {
    btn.addEventListener('click', () => {
      performancePeriodo = btn.dataset.periodo;
      renderPerformance(container);
    });
  });
  renderPerformanceConteudo();
}

function renderPerformanceConteudo(){
  const el = document.getElementById('performanceConteudo');
  const registros = getRegistrosNoPeriodo(performancePeriodo);

  if(registros.length === 0){
    el.innerHTML = `<div class="empty-state">Nenhum registro de atividade nesse período. Registre seus dias na aba "Registrar Atividade".</div>`;
    return;
  }

  const totais = registros.reduce((acc, r) => {
    acc.ligacoes += r.ligacoes; acc.reunioes += r.reunioes; acc.propostas += r.propostas; acc.fechamentos += r.fechamentos;
    return acc;
  }, { ligacoes:0, reunioes:0, propostas:0, fechamentos:0 });

  const etapas = [
    { label:'Ligações', valor: totais.ligacoes },
    { label:'Reuniões', valor: totais.reunioes },
    { label:'Propostas', valor: totais.propostas },
    { label:'Fechamentos', valor: totais.fechamentos },
  ];

  const melhorDia = [...registros].sort((a, b) => (b.fechamentos - a.fechamentos) || (b.ligacoes - a.ligacoes))[0];
  const taxaGeral = totais.ligacoes > 0 ? Math.round((totais.fechamentos / totais.ligacoes) * 100) : 0;

  el.innerHTML = `
    <div class="stat-grid" style="margin-bottom:26px;">
      <div class="stat-card">
        <div class="stat-value">${totais.ligacoes}</div>
        <div class="stat-label">Ligações no período</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${taxaGeral}%</div>
        <div class="stat-label">Taxa de conversão geral</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${formatarDataBR(melhorDia.data)}</div>
        <div class="stat-label">Melhor dia (${melhorDia.fechamentos} fechamento${melhorDia.fechamentos === 1 ? '' : 's'})</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:0;">Funil de conversão</div>
    <div class="funil-etapas" id="funilEtapas"></div>

    <div class="section-title">Atividade ao longo do tempo</div>
    <div class="toolbar" id="metricaFiltros"></div>
    <div class="chart-card">
      <h3 id="chartTitulo"></h3>
      <div class="bar-chart-scroll">
        <div class="bar-chart" id="atividadeChart"></div>
      </div>
      <div class="chart-tooltip" id="chartTooltip" hidden></div>
    </div>
  `;

  const base = etapas[0].valor || 1;
  const funilEl = document.getElementById('funilEtapas');
  funilEl.innerHTML = etapas.map((etapa, i) => {
    const pct = Math.min(100, Math.round((etapa.valor / base) * 100));
    const conversaoTexto = i > 0
      ? `<div class="funil-conversao">${etapas[i - 1].valor > 0 ? Math.round((etapa.valor / etapas[i - 1].valor) * 100) : 0}% converteram de "${etapas[i - 1].label}" para "${etapa.label}"</div>`
      : '';
    return `
      ${conversaoTexto}
      <div class="funil-etapa">
        <div class="funil-etapa-header">
          <span class="funil-etapa-label">${etapa.label}</span>
          <span class="funil-etapa-valor">${etapa.valor}</span>
        </div>
        <div class="funil-barra-track">
          <div class="funil-barra-fill" style="width:${pct}%; background:${FUNIL_CORES[i]};"></div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('metricaFiltros').innerHTML = METRICAS_ATIVIDADE.map(m => `
    <button class="filter-chip ${atividadeMetrica === m.id ? 'active' : ''}" data-metrica="${m.id}">${m.label}</button>
  `).join('');
  document.getElementById('metricaFiltros').querySelectorAll('[data-metrica]').forEach(btn => {
    btn.addEventListener('click', () => {
      atividadeMetrica = btn.dataset.metrica;
      renderGraficoAtividade();
    });
  });

  renderGraficoAtividade();
}

function renderGraficoAtividade(){
  const serie = construirSerieDiaria(performancePeriodo);
  const metricaInfo = METRICAS_ATIVIDADE.find(m => m.id === atividadeMetrica);
  const periodoInfo = PERIODOS_PERFORMANCE.find(p => p.id === performancePeriodo);
  document.querySelectorAll('#metricaFiltros [data-metrica]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.metrica === atividadeMetrica);
  });
  document.getElementById('chartTitulo').textContent = `${metricaInfo.label} — ${periodoInfo.label.toLowerCase()}`;

  const chart = document.getElementById('atividadeChart');
  const valores = serie.map(s => s[atividadeMetrica]);
  const maxValor = Math.max(...valores, 1);
  const stride = serie.length <= 8 ? 1 : (serie.length <= 31 ? 5 : Math.ceil(serie.length / 8));

  chart.innerHTML = serie.map((ponto, i) => {
    const valor = ponto[atividadeMetrica];
    const alturaPct = Math.max(2, Math.round((valor / maxValor) * 100));
    const mostrarLabel = i % stride === 0 || i === serie.length - 1;
    const [, m, d] = ponto.data.split('-');
    const labelCurto = `${d}/${m}`;
    return `
      <button type="button" class="bar-col" data-data="${ponto.data}" data-valor="${valor}" data-label="${labelCurto}">
        <div class="bar-mark" style="height:${alturaPct}%;"></div>
        ${mostrarLabel ? `<span class="bar-axis-label">${labelCurto}</span>` : ''}
      </button>
    `;
  }).join('');

  chart.querySelectorAll('.bar-col').forEach(bar => {
    bar.addEventListener('mouseenter', () => mostrarTooltipBarra(bar));
    bar.addEventListener('focus', () => mostrarTooltipBarra(bar));
    bar.addEventListener('mouseleave', esconderTooltipBarra);
    bar.addEventListener('blur', esconderTooltipBarra);
  });
}

function mostrarTooltipBarra(bar){
  const tooltip = document.getElementById('chartTooltip');
  const chart = document.getElementById('atividadeChart');
  const chartRect = chart.getBoundingClientRect();
  const barRect = bar.getBoundingClientRect();
  const metricaInfo = METRICAS_ATIVIDADE.find(m => m.id === atividadeMetrica);
  tooltip.innerHTML = '';
  const valorSpan = document.createElement('span');
  valorSpan.className = 'ct-valor';
  valorSpan.textContent = bar.dataset.valor;
  tooltip.appendChild(valorSpan);
  tooltip.appendChild(document.createTextNode(` ${metricaInfo.label.toLowerCase()} · ${bar.dataset.label}`));
  tooltip.style.left = (barRect.left - chartRect.left + barRect.width / 2) + 'px';
  tooltip.style.top = (barRect.top - chartRect.top) + 'px';
  tooltip.hidden = false;
}
function esconderTooltipBarra(){
  document.getElementById('chartTooltip').hidden = true;
}

/* ---------- MINHA META ---------- */
function renderMinhaMeta(container){
  if(APP_STATE.metaPessoal){
    metaForm = { ...APP_STATE.metaPessoal };
  }
  container.innerHTML = `
    <div class="form-grid">
      <div class="form-field">
        <label for="metaMetrica">Métrica</label>
        <select id="metaMetrica">${METRICAS_ATIVIDADE.map(m => `<option value="${m.id}" ${metaForm.metrica === m.id ? 'selected' : ''}>${m.label}</option>`).join('')}</select>
      </div>
      <div class="form-field">
        <label for="metaPeriodo">Período</label>
        <select id="metaPeriodo">
          <option value="dia" ${metaForm.periodo === 'dia' ? 'selected' : ''}>Por dia</option>
          <option value="semana" ${metaForm.periodo === 'semana' ? 'selected' : ''}>Por semana (últimos 7 dias)</option>
          <option value="mes" ${metaForm.periodo === 'mes' ? 'selected' : ''}>Por mês</option>
        </select>
      </div>
      <div class="form-field">
        <label for="metaValor">Meta (número)</label>
        <input type="number" min="1" id="metaValor" placeholder="ex: 20" value="${metaForm.valor}" />
      </div>
    </div>
    <div class="flashcard-controls" style="justify-content:flex-start;margin-bottom:24px;">
      <button class="btn btn-primary" id="salvarMetaBtn">🎯 Salvar meta</button>
      ${APP_STATE.metaPessoal ? '<button class="btn btn-ghost" id="removerMetaBtn">Remover meta</button>' : ''}
    </div>
    <div id="metaMeterWrap"></div>
  `;
  document.getElementById('salvarMetaBtn').addEventListener('click', salvarMeta);
  const removerBtn = document.getElementById('removerMetaBtn');
  if(removerBtn) removerBtn.addEventListener('click', removerMeta);
  renderMetaMeter();
}

function salvarMeta(){
  const metrica = document.getElementById('metaMetrica').value;
  const periodo = document.getElementById('metaPeriodo').value;
  const valor = parseInt(document.getElementById('metaValor').value, 10);
  if(!valor || valor <= 0){
    alert('Informe um valor de meta maior que zero.');
    return;
  }
  metaForm = { metrica, periodo, valor };
  APP_STATE.metaPessoal = { ...metaForm };
  saveState();
  showToast('Meta salva!');
  renderMinhaMeta(document.getElementById('metasSubcontent'));
}

function removerMeta(){
  if(!confirm('Remover sua meta atual?')) return;
  APP_STATE.metaPessoal = null;
  saveState();
  renderMinhaMeta(document.getElementById('metasSubcontent'));
}

function calcularProgressoMeta(){
  const meta = APP_STATE.metaPessoal;
  if(!meta) return null;
  const hoje = new Date();
  let inicio;
  if(meta.periodo === 'dia'){ inicio = new Date(hoje); }
  else if(meta.periodo === 'semana'){ inicio = new Date(hoje); inicio.setDate(inicio.getDate() - 6); }
  else { inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1); }
  const inicioStr = formatarDataISO(inicio);
  const total = APP_STATE.registrosAtividade
    .filter(r => r.data >= inicioStr)
    .reduce((acc, r) => acc + r[meta.metrica], 0);
  const pct = Math.min(100, Math.round((total / meta.valor) * 100));
  return { total, pct };
}

function renderMetaMeter(){
  const wrap = document.getElementById('metaMeterWrap');
  const meta = APP_STATE.metaPessoal;
  if(!meta){
    wrap.innerHTML = `<div class="empty-state">Você ainda não definiu uma meta. Preencha o formulário acima.</div>`;
    return;
  }
  const progresso = calcularProgressoMeta();
  const metricaLabel = METRICAS_ATIVIDADE.find(m => m.id === meta.metrica).label;
  const periodoLabel = meta.periodo === 'dia' ? 'hoje' : meta.periodo === 'semana' ? 'nos últimos 7 dias' : 'neste mês';
  wrap.innerHTML = `
    <div class="meta-meter">
      <div class="meta-meter-top">
        <span class="meta-meter-label">${metricaLabel} ${periodoLabel}: ${progresso.total}/${meta.valor}</span>
        <span class="meta-meter-pct">${progresso.pct}%</span>
      </div>
      <div class="progress-bar" style="height:14px;"><div class="progress-fill" style="width:${progresso.pct}%"></div></div>
    </div>
  `;
}
