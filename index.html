<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Agentes SDR EQI</title>
  <meta name="description" content="Console para os 13 agentes de IA da esteira de SDR da EQI Investimentos.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="topnav" id="topnav"></nav>

  <main class="page">
    <div class="page-header">
      <h1>Hub de Agentes SDR EQI</h1>
      <p>
        Console de operação para os 13 agentes de IA da esteira de prospecção da EQI Investimentos.
        Escolha uma estação do pipeline, cole os dados do lead ou da conversa e rode o agente correspondente.
      </p>
    </div>

    <div class="pipeline" id="pipeline"></div>
  </main>

  <script src="js/agents-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderPipeline() {
      const mount = document.getElementById("pipeline");
      const html = PHASES.map((phase) => {
        const agentsInPhase = AGENTS.filter((a) => a.phase === phase.id);
        const cards = agentsInPhase.map((agent) => {
          const typeLabel = TYPE_LABELS[agent.type];
          return `
            <a class="agent-card" href="agente.html?id=${agent.id}">
              <div class="agent-card__top">
                <span class="agent-card__id">AGENTE ${String(agent.id).padStart(2, "0")}</span>
                <span class="badge badge--${agent.type}"><span class="badge__dot"></span>${typeLabel}</span>
              </div>
              <div class="agent-card__name">${agent.name}</div>
              <div class="agent-card__objective">${agent.objective}</div>
            </a>
          `;
        }).join("");

        return `
          <div class="pipeline__phase">
            <div class="pipeline__rail"><div class="pipeline__node">${phase.id}</div></div>
            <div class="pipeline__body">
              <h2 class="pipeline__phase-title">${phase.name}</h2>
              <div class="pipeline__phase-sub">${agentsInPhase.length} agente(s) nesta fase</div>
              <div class="pipeline__grid">${cards}</div>
            </div>
          </div>
        `;
      }).join("");

      mount.innerHTML = html;
    }

    injectTopNav("dashboard");
    renderPipeline();
  </script>
</body>
</html>
